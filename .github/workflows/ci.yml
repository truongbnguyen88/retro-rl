name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Pin to the exact version used locally so CI and dev produce identical
      # results. Bump here and in pyproject.toml [dev] together when upgrading.
      - run: pip install "ruff==0.15.13"
      - name: ruff check
        run: ruff check src tests --output-format=github
      - name: ruff format --check
        run: ruff format --check src tests

  test:
    name: Tests (non-emulator)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # stable-retro's Linux wheels install cleanly on ubuntu-latest (the macOS
      # arm64 source-build patch is not needed here). We still exclude
      # test_env.py because it requires the Airstriker ROM at runtime.
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest (excluding emulator tests)
        # test_env.py is the only file that calls retro.make() / needs a ROM.
        # All other tests use mocks or pure-Python fixtures.
        run: pytest --ignore=tests/test_env.py -ra
