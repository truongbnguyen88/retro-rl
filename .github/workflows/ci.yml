name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Pin to the exact version used locally so CI and dev produce identical
      # results. Bump here and in pyproject.toml [dev] together when upgrading.
      - run: pip install "ruff==0.15.13"
      - name: ruff check
        run: ruff check src tests --output-format=github
      - name: ruff format --check
        run: ruff format --check src tests

  test:
    name: Tests (non-emulator)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Install without stable-retro: emulator tests run separately, and the
      # rest of the suite (backend, training callbacks, evaluation, models,
      # agents) doesn't need an emulator. This keeps CI under 3 minutes.
      - name: Install (skip stable-retro)
        run: |
          # stable-retro pulls in a libretro core build; we skip it here and
          # install everything else. `--no-deps` on stable-retro would still
          # need it on PYTHONPATH, so we strip it from the dep list instead.
          pip install --upgrade pip
          pip install \
            "stable-baselines3>=2.3.0" \
            "gymnasium>=0.29.1" \
            "shimmy>=1.3" \
            "torch>=2.2.0" \
            "numpy>=1.26" \
            "opencv-python-headless>=4.9" \
            "imageio>=2.34" \
            "imageio-ffmpeg>=0.4.9" \
            "pydantic>=2.6" \
            "pyyaml>=6.0" \
            "tensorboard>=2.16" \
            "rich>=13.7" \
            "fastapi>=0.110" \
            "uvicorn[standard]>=0.29" \
            "requests>=2.31" \
            "pytest>=8.0" \
            "pytest-cov>=4.1" \
            "httpx>=0.27"
          # Editable install of our package, no deps (already installed above).
          pip install --no-deps -e .
      - name: Run pytest (excluding emulator tests)
        # test_env.py is the only file that imports `retro`; everything else
        # uses mocks or pure-Python fixtures.
        run: pytest --ignore=tests/test_env.py -ra
