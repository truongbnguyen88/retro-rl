# Airstriker (Genesis) environment configuration.
# Validation stand-in for Contra — Airstriker ships with stable-retro as a
# freely-distributable homebrew ROM, so this config works on any clean install
# with no separate ROM download. Used by Milestone 1 smoke tests.
#
# When the real Contra ROM is dumped and imported, swap back to env.yaml.

game: Airstriker-Genesis-v0   # ships with stable-retro 1.x (gymnasium-versioned)
state: Level1                  # verify via: retro.list_states('Airstriker-Genesis-v0')
scenario: scenario
record: false

# Preprocessing — same conventions as Contra; only game/state differ.
grayscale: true
resize: [84, 84]
frame_stack: 4
action_repeat: 4
sticky_action_prob: 0.0
max_episode_steps: 4500

# Airstriker is vertical-scroll + has lives; end_on_life_lost is meaningful.
end_on_life_lost: true

# Airstriker integration's data.json exposes these RAM-derived vars.
# (No x-progress equivalent — it's vertical scrolling. Weight stays in config
# but the missing key just contributes 0 and emits one warning.)
info_keys:
  score: score
  x_pos: x_pos          # absent in Airstriker; treated as missing → 0 contribution
  lives: lives
  stage_clear: gameover  # repurposed: gameover flag as "episode boundary" signal

reward:
  score_delta: 1.0
  x_progress: 0.0       # disabled — no horizontal-progress signal in Airstriker
  x_regress_penalty: 0.0
  life_loss: -25.0
  death: -100.0
  stage_clear: 0.0      # disabled — gameover already triggers `death`
  clip: [-10.0, 10.0]
