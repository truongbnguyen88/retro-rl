# v12 smoke test — 500K-step validation before the full 4M run.
# Inherits ppo_v12.yaml; only shortens the run and renames it.
#
# SECOND PASS (LR re-tune): first smoke @ lr=1e-4 hit a 200K-300K plateau
# (756→777 over 100K steps), then broke out at 300K-400K (+613). Classic
# transformer cold-start: attention heads oscillate early at lr=1e-4, then
# stabilise. Dropping to 5e-5 should move the breakout earlier and close
# the gap vs v9 smoke's 2608 @ 500K (first pass landed 1529).
#
# What to check at 500K (eval every 100K → 5 evals):
#   - explained_variance > 0.85  (value head fitting);
#   - clip_fraction < 0.25  (standard PPO);
#   - eval/mean_return ≥ ~2000 (within 25% of v9 smoke bar of 2608);
#   - no 100K-step plateau in the return curve (confirms LR was the issue);
#   - fps ≥ ~25 (8 per-frame CNN passes per obs).
#
# GO criteria (all must hold):   EV > 0.85, clip_fraction < 0.25, return ≥ 2000
# ABORT criteria:                plateau persists → Nature-CNN tokenizer ceiling;
#                                consider K=6 or IMPALA tokenizer redesign.

extends: configs/ppo_v12.yaml

run_name: ppo_airstriker_v12_smoke
total_timesteps: 500000

ppo:
  learning_rate: 5.0e-5
