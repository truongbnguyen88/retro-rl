# PPO training configuration.
# Hyperparameters tuned for Atari-style visual inputs; reasonable starting point
# for Airstriker. Airstriker is short and visually simple, so 2M steps is
# typically enough to surface a clear learning signal; bump to 10M+ for longer
# experiments or harder games.

run_name: ppo_airstriker_v6   # v5 hit a learning ceiling at ~244 return (1.4M steps, 10 kills) then DE-COMMITTED: eval return regressed to 213.88 by 2M, top-2 action mass fell from 75% (LEFT+RIGHT sweep) to 51%, approx_kl → 0.0000. Diagnosis: constant ent_coef=0.02 vs Discrete(9) max-entropy ln(9)≈2.197 holds the policy near-uniform once advantages shrink. v6 fixes this with a linear ent_coef schedule (0.02 → 0.001) over the run — high exploration early, commitment late.
seed: 42

env_config: configs/env.yaml
n_envs: 8                     # SubprocVecEnv workers; reduce on low-core machines

# Algorithm
algorithm: ppo
policy: cnn                   # registered in models/policies.py
total_timesteps: 2_000_000

ppo:
  learning_rate: 2.5e-4       # linear schedule applied in trainer
  n_steps: 128                # per env; batch = n_envs * n_steps = 1024
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1             # linear schedule applied in trainer
  ent_coef: 0.02              # initial entropy bonus — high enough to explore the 9-way action space early
  ent_coef_final: 0.001       # v6: linearly anneal to 0.001 by total_timesteps; lets the policy commit late
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantage: true

# Logging + eval
log_dir: outputs/tensorboard
checkpoint_dir: outputs/checkpoints
video_dir: outputs/videos
log_interval: 10              # PPO updates between TB flushes

eval:
  every_steps: 100_000        # env steps between evals
  n_episodes: 5
  deterministic: true
  record_video: true

checkpoint:
  every_steps: 250_000
  keep_last_k: 5
  keep_best: true
