# v9 training config — capacity + decision-rate ablation.
# Inherits configs/ppo.yaml (the v8 config) and overrides only what changes for
# v9. v8's config is left untouched so its run stays reproducible.
#
# v9 bundles five changes (three structural + two found via the smoke ladder):
#   1. action_repeat 4 → 8        (in configs/env_v9.yaml — decision rate 7.5 Hz)
#   2. RetroCNN → IMPALA ResNet   (features_extractor below)
#   3. auto_fire.period 18 → 12   (in configs/env_v9.yaml — 5 Hz fire rate)
#   4. learning_rate 2.5e-4 → 1e-4 (deeper IMPALA net + larger AR=8 return
#      targets diverged the value head at v8's LR; smoke 2 fixed EV-pinned-at-0)
#   5. normalize_reward true       (VecNormalize, reward only; smoke 3 lifted
#      explained_variance 0.4 → 0.9 and eval return ~245 → 2608 @ 500K)
#
# Smoke ladder (all at 500K, single-variable deltas):
#   - ppo_v9_smoke_lr.yaml   : LR 1e-4               → EV off zero but ~0.4 ceiling
#   - ppo_v9_smoke_vecnorm   : LR 1e-4 + VecNormalize → EV ~0.9, return 2608  ← GO
#
# total_timesteps stays 4M (inherited). Measured throughput ~51 policy-steps/s
# on Apple Silicon (action_repeat=8 doubles emulator frames/step, IMPALA-on-CPU
# is ~1.5× Nature-CNN) → ~21–22 h wall-clock. VecNormalize adds no meaningful
# cost. Resume restores VecNormalize stats from the checkpoint's .pkl sidecar.

extends: configs/ppo.yaml

run_name: ppo_airstriker_v9
env_config: configs/env_v9.yaml

# IMPALA ResNet (3 conv stacks, channels 16→32→32, 2 residual blocks each).
# features_dim 256 is the canonical IMPALA FC width (vs RetroCNN's 512). The
# residual depth is where the added capacity lives; a wider FC head buys little.
features_extractor: impala
features_dim: 256

# Reward normalization (SB3 VecNormalize, norm_reward only — observations stay
# raw). Rescales returns to ~unit variance so the value-target regression is
# well-conditioned. Required for the IMPALA + AR=8 stack: without it the value
# head ceilings at EV ~0.4 and the noisy baseline stalls policy learning.
normalize_reward: true

ppo:
  learning_rate: 1.0e-4
