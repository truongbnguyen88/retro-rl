# Airstriker (Genesis) environment configuration.
# Airstriker ships with stable-retro as a freely-distributable homebrew ROM,
# so this config works on any clean install with no separate ROM download.

game: Airstriker-Genesis-v0   # stable-retro game id (gymnasium-versioned)
state: Level1                 # verify via: retro.list_states('Airstriker-Genesis-v0')
scenario: scenario            # scenario.json key inside the integration
record: false                 # record .bk2 replays alongside training

# Preprocessing — standard Atari-style stack.
grayscale: true
resize: [84, 84]              # (H, W)
frame_stack: 4
action_repeat: 4              # frameskip; reward summed across skipped frames
sticky_action_prob: 0.0       # 0 disables; set 0.25 for stochasticity
max_episode_steps: 4500       # ~5 min of game time at 15Hz post-skip

# Episode boundaries
# false = full game (3 lives in Airstriker). With single-life episodes the
# `death` and `life_loss` penalties collapse to the same step and both get
# clipped to the same magnitude — leaving no gradient signal that
# distinguishes "died at step 1" from "died at step 4000". Multi-life
# episodes stagger the life-loss penalty across the episode and give the
# value function something to learn from.
end_on_life_lost: false

# Airstriker integration's data.json exposes these RAM-derived vars.
# Airstriker is vertical-scroll — no x-progress equivalent, so x_pos is left
# pointing at a missing key (contributes 0 and emits one warning on first step).
info_keys:
  score: score
  x_pos: x_pos          # absent in Airstriker integration → 0 contribution
  lives: lives
  stage_clear: gameover # repurposed: gameover flag as "episode boundary" signal

# Reward shaping weights (additive, applied on top of in-game score delta).
#
# Diagnosis from the first 2M run (ppo_airstriker): with `end_on_life_lost: true`
# and `clip: [-10, 10]`, every dying episode returned exactly -10.0, giving the
# deterministic eval policy no gradient signal about *when* it died. The
# argmax policy collapsed to "move left → die" and got stuck there for 600K+
# steps while the stochastic policy climbed past 290 return.
#
# This config (v2 shaping) fixes that by: (1) un-clipping the death penalty
# bottom so longer survival is preferred, (2) adding a per-step `survival_bonus`
# so the gradient prefers any action that doesn't die, (3) softening per-life
# loss now that we have 3 lives per episode.
reward:
  score_delta: 1.0            # raw in-game score delta (each kill ~100 pts → clipped to +10)
  x_progress: 0.0             # disabled — no horizontal-progress signal in Airstriker
  x_regress_penalty: 0.0      # disabled — symmetric with x_progress
  life_loss: -10.0            # per-life penalty (fires 3× before game over)
  death: -30.0                # one-shot on game over (after final life)
  stage_clear: 0.0            # disabled — gameover already triggers `death`
  survival_bonus: 0.05        # per-step reward on non-terminal frames; +0.05 × ~1500 alive steps ≈ +75 ceiling
  clip: [-50.0, 10.0]         # loose lower bound so death (-40 combined) actually registers
