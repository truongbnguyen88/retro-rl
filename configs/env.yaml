# Contra environment configuration.
# Consumed by env.make_env(). Every knob is intentional — no silent defaults in code.

game: Contra-Nes              # stable-retro game id
state: Level1                 # starting state; check with `retro.list_states("Contra-Nes")`
scenario: scenario            # scenario.json key inside the integration
record: false                 # record .bk2 replays alongside training

# Preprocessing
grayscale: true
resize: [84, 84]              # (H, W)
frame_stack: 4
action_repeat: 4              # frameskip; reward summed across skipped frames
sticky_action_prob: 0.0       # 0 disables; set 0.25 for stochasticity
max_episode_steps: 4500       # ~5 min of game time at 15Hz post-skip

# Episode boundaries
end_on_life_lost: true        # true = single-life episodes (faster credit assignment)

# Reward shaping weights (additive, applied on top of in-game score delta)
# All weights are per-step unless noted.
reward:
  score_delta: 1.0            # raw in-game score delta
  x_progress: 0.01            # reward for rightward progress (Δx)
  x_regress_penalty: 0.005    # symmetric penalty for moving left
  life_loss: -25.0            # one-shot when a life is lost
  death: -100.0               # one-shot on game over
  stage_clear: 200.0          # one-shot on stage clear
  clip: [-10.0, 10.0]         # per-step clip after shaping
